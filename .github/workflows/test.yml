name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PythonSCAD
        run: |
          wget -qO - https://repos.pythonscad.org/apt/pythonscad-archive-keyring.gpg | \
          sudo gpg --dearmor -o /usr/share/keyrings/pythonscad-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/pythonscad-archive-keyring.gpg] https://repos.pythonscad.org/apt $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/pythonscad.list
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/pythonscad.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
          sudo apt-get install -y -qq pythonscad xvfb libgl1-mesa-dri

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Project Dependencies
        run: |
          uv sync --all-groups --system-site-packages
          uv pip install -e .

      - name: Run Linter
        run: make lint

      - name: Run Tests
        run: make test

      - name: Build STL
        run: make build

      - name: Generate PNG
        run: xvfb-run --auto-servernum make render

      - name: Deploy Assets
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: assets
          force_orphan: true
          keep_files: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-assets
          path: |
            build/keyboard.stl
            build/keyboard.png
