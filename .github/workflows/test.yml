name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies (PythonSCAD & F3D)
        run: |
          # Install PythonSCAD
          wget -qO - https://repos.pythonscad.org/apt/pythonscad-archive-keyring.gpg | \
          sudo gpg --dearmor -o /usr/share/keyrings/pythonscad-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/pythonscad-archive-keyring.gpg] https://repos.pythonscad.org/apt $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/pythonscad.list
          
          # Download F3D
          curl -L https://github.com/f3d-app/f3d/releases/download/v3.4.1/F3D-3.4.1-Linux-x86_64-raytracing.deb -o f3d.deb
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq ./f3d.deb pythonscad xvfb libgl1-mesa-dri

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install Project Dependencies
        run: |
          uv venv --system-site-packages
          uv sync --all-groups --active
          uv pip install -e . meshlib

      - name: Run Linter
        run: make -j $(nproc) lint

      - name: Run Tests
        run: make -j $(nproc) test

      - name: Build STL
        run: make -j $(nproc) build

      - name: Generate PNG
        run: xvfb-run make -j $(nproc) render

      - name: Deploy Assets
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: assets
          force_orphan: true
          keep_files: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-assets
          path: |
            build/main.stl
            build/main.3mf
            build/main*.png
